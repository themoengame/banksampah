<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Sampah Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .loading { opacity: 0.6; pointer-events: none; }
        .card-hover:hover { transform: translateY(-2px); transition: 0.2s; }
        @media (max-width: 640px) { .sidebar-mobile { transform: translateX(-100%); position: fixed; z-index: 50; transition: 0.2s; } .sidebar-mobile.open { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="min-h-screen"></div>

    <script>
        // ========== KONFIGURASI ==========
        // GANTI DENGAN URL WEB APP ANDA (hasil deploy doPost)
        const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbwShRkYOP7qPLYdLYUafx17B3TRMx0jnDe3Oe3XrTZtgCeaP6fetMXsYCarPrpWzl3BZg/exec';
        
        let currentUser = null;
        
        // ========== FUNGSI PANGGIL API ==========
        async function callApi(action, data = {}) {
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, data })
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return await response.json();
            } catch (err) {
                console.error(err);
                return { success: false, message: 'Gagal terhubung ke server: ' + err.message };
            }
        }
        
        // ========== ROUTING & RENDER ==========
        function navigate(page) {
            window.history.pushState({}, '', `#${page}`);
            renderPage(page);
        }
        
        async function renderPage(page) {
            const app = document.getElementById('app');
            if (!app) return;
            
            const session = JSON.parse(localStorage.getItem('session') || 'null');
            if (page !== 'login' && !session) {
                page = 'login';
            } else if (page !== 'login' && session) {
                currentUser = session;
            }
            
            if (page === 'login') {
                renderLogin(app);
            } else if (page === 'admin' && session?.role === 'admin') {
                renderAdminDashboard(app);
            } else if (page === 'petugas' && (session?.role === 'petugas' || session?.role === 'admin')) {
                renderPetugasDashboard(app);
            } else if (page === 'nasabah' && session?.role === 'nasabah') {
                renderNasabahDashboard(app);
            } else {
                renderLogin(app);
            }
        }
        
        // ========== HALAMAN LOGIN ==========
        function renderLogin(container) {
            container.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-emerald-800 to-emerald-600 flex items-center justify-center p-4">
                    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
                        <div class="text-center mb-6">
                            <i class="fas fa-recycle text-5xl text-emerald-700"></i>
                            <h1 class="text-3xl font-bold text-gray-800 mt-2">Bank Sampah</h1>
                            <p class="text-gray-500">Kelola sampah, raih manfaat</p>
                        </div>
                        <form id="loginForm" class="space-y-4">
                            <div>
                                <label class="block text-gray-700 font-medium">Role</label>
                                <select id="role" class="w-full border rounded-xl px-4 py-3">
                                    <option value="nasabah">Nasabah</option>
                                    <option value="petugas">Petugas</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium">Username</label>
                                <input type="text" id="username" class="w-full border rounded-xl px-4 py-3" placeholder="Username" autocomplete="username" required>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium">Password</label>
                                <input type="password" id="password" class="w-full border rounded-xl px-4 py-3" placeholder="Password" autocomplete="current-password" required>
                            </div>
                            <button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-3 rounded-xl transition">
                                <i class="fas fa-sign-in-alt"></i> Masuk
                            </button>
                        </form>
                        <p id="errorMsg" class="text-red-600 text-sm text-center mt-4 hidden"></p>
                        <div class="text-center text-xs text-gray-400 mt-6 border-t pt-4">
                            Demo: Nasabah (nasabah1 / 123) | Petugas (petugas1 / 123) | Admin (admin / admin123)
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const role = document.getElementById('role').value;
                const btn = e.target.querySelector('button');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
                
                const result = await callApi('login', { username, password, role });
                if (result.success) {
                    localStorage.setItem('session', JSON.stringify(result.user));
                    currentUser = result.user;
                    navigate(result.role);
                } else {
                    document.getElementById('errorMsg').innerText = result.message;
                    document.getElementById('errorMsg').classList.remove('hidden');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
                    btn.disabled = false;
                }
            });
        }
        
        // ========== DASHBOARD ADMIN ==========
        async function renderAdminDashboard(container) {
            container.innerHTML = `
                <div class="flex min-h-screen">
                    <aside class="bg-emerald-900 text-white w-64 p-4 hidden md:block">
                        <h2 class="text-2xl font-bold mb-6"><i class="fas fa-leaf"></i> Bank Sampah</h2>
                        <nav>
                            <a href="#" onclick="navigate('admin-dashboard')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="#" onclick="loadAdminData('nasabah')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-users"></i> Nasabah</a>
                            <a href="#" onclick="loadAdminData('petugas')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-user-tie"></i> Petugas</a>
                            <a href="#" onclick="loadAdminData('harga')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-tags"></i> Harga</a>
                            <a href="#" onclick="loadAdminData('transaksi')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-exchange-alt"></i> Transaksi</a>
                            <a href="#" onclick="loadAdminData('penukaran')" class="block py-2 px-3 rounded hover:bg-emerald-700"><i class="fas fa-money-bill-wave"></i> Penukaran</a>
                            <a href="#" onclick="logout()" class="block py-2 px-3 rounded mt-10 text-red-300 hover:bg-red-800"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </nav>
                    </aside>
                    <main class="flex-1 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-2xl font-bold" id="pageTitle">Dashboard Admin</h1>
                            <div class="bg-white rounded-full px-4 py-1 shadow"><i class="fas fa-user-circle"></i> ${currentUser?.nama || 'Admin'}</div>
                        </div>
                        <div id="adminContent">Memuat...</div>
                    </main>
                </div>
            `;
            loadAdminData('dashboard');
        }
        
        async function loadAdminData(section) {
            const contentDiv = document.getElementById('adminContent');
            if (!contentDiv) return;
            contentDiv.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-spin"></i> Memuat...</div>';
            
            if (section === 'dashboard') {
                const stats = await callApi('getDashboardStats');
                if (stats.success) {
                    const s = stats.stats;
                    contentDiv.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6">
                            <div class="bg-white p-5 rounded-2xl shadow card-hover"><i class="fas fa-users text-3xl text-emerald-600"></i><div class="text-2xl font-bold">${s.totalNasabah}</div><div>Nasabah</div></div>
                            <div class="bg-white p-5 rounded-2xl shadow"><i class="fas fa-trash-alt text-3xl text-emerald-600"></i><div class="text-2xl font-bold">${s.transaksiHariIni}</div><div>Transaksi Hari Ini</div></div>
                            <div class="bg-white p-5 rounded-2xl shadow"><i class="fas fa-weight-hanging text-3xl text-emerald-600"></i><div class="text-2xl font-bold">${s.totalSampahHariIni} kg</div><div>Sampah Masuk</div></div>
                            <div class="bg-white p-5 rounded-2xl shadow"><i class="fas fa-hand-holding-usd text-3xl text-emerald-600"></i><div class="text-2xl font-bold">Rp${s.pendapatanHariIni.toLocaleString()}</div><div>Pendapatan</div></div>
                        </div>
                    `;
                } else contentDiv.innerHTML = '<div class="bg-red-100 p-4 rounded">Gagal memuat dashboard</div>';
            }
            else if (section === 'nasabah') {
                const res = await callApi('getDataNasabah');
                if (res.success) {
                    let rows = '';
                    res.data.forEach(n => {
                        rows += `<tr class="border-b"><td class="p-2">${n.nama}</td><td>${n.username}</td><td>${n.noHp}</td><td class="font-semibold">Rp${(n.saldo||0).toLocaleString()}</td><td>${n.status}</td></tr>`;
                    });
                    contentDiv.innerHTML = `<div class="bg-white rounded-2xl shadow p-4 overflow-x-auto"><h2 class="text-xl font-bold mb-2">Data Nasabah</h2><table class="min-w-full"><thead><tr class="bg-gray-100"><th>Nama</th><th>Username</th><th>No HP</th><th>Saldo</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                } else contentDiv.innerHTML = '<div class="text-red-600">Gagal memuat nasabah</div>';
            }
            else if (section === 'petugas') {
                const res = await callApi('getDataPetugas');
                if (res.success) {
                    let rows = '';
                    res.data.forEach(p => {
                        rows += `<tr class="border-b"><td class="p-2">${p.nama}</td><td>${p.noHp}</td><td>${p.lokasi}</td><td>${p.username}</td><td>${p.status}</td></tr>`;
                    });
                    contentDiv.innerHTML = `<div class="bg-white rounded-2xl shadow p-4"><h2 class="text-xl font-bold">Petugas</h2><table class="min-w-full"><thead><tr><th>Nama</th><th>No HP</th><th>Lokasi</th><th>Username</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                } else contentDiv.innerHTML = '<div class="text-red-600">Gagal memuat petugas</div>';
            }
            else if (section === 'harga') {
                const res = await callApi('getHargaSampah');
                if (res.success) {
                    let rows = '';
                    res.data.forEach(h => {
                        rows += `<tr class="border-b"><td class="p-2">${h.jenis}</td><td>${h.satuan}</td><td class="font-semibold">Rp${h.hargaBeli.toLocaleString()}</td><td class="font-semibold">Rp${h.hargaJual.toLocaleString()}</td></tr>`;
                    });
                    contentDiv.innerHTML = `<div class="bg-white rounded-2xl shadow p-4"><h2 class="text-xl font-bold">Harga Sampah Aktif</h2><table class="min-w-full"><thead><tr><th>Jenis</th><th>Satuan</th><th>Harga Beli</th><th>Harga Jual</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                } else contentDiv.innerHTML = '<div class="text-red-600">Gagal memuat harga</div>';
            }
            else if (section === 'transaksi') {
                const res = await callApi('getSemuaTransaksi');
                if (res.success) {
                    let rows = '';
                    res.data.slice(0, 50).forEach(t => {
                        rows += `<tr class="border-b"><td class="p-2">${new Date(t.tanggal).toLocaleDateString()}</td><td>${t.namaNasabah}</td><td>${t.jenisSampah}</td><td>${t.berat} kg</td><td class="font-semibold">Rp${t.total.toLocaleString()}</td><td>${t.petugas}</td></tr>`;
                    });
                    contentDiv.innerHTML = `<div class="bg-white rounded-2xl shadow p-4 overflow-x-auto"><h2 class="text-xl font-bold">Semua Transaksi</h2><table class="min-w-full"><thead><tr><th>Tanggal</th><th>Nasabah</th><th>Jenis</th><th>Berat</th><th>Total</th><th>Petugas</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                } else contentDiv.innerHTML = '<div class="text-red-600">Gagal memuat transaksi</div>';
            }
            else if (section === 'penukaran') {
                const res = await callApi('getDataPenukaran');
                if (res.success) {
                    let rows = '';
                    res.data.forEach(p => {
                        rows += `<tr class="border-b"><td class="p-2">${new Date(p.tanggal).toLocaleDateString()}</td><td>${p.namaNasabah}</td><td>${p.metode}</td><td class="font-semibold">Rp${p.nominal.toLocaleString()}</td><td>${p.status}</td><td>${p.status === 'Diproses' ? `<button onclick="updatePenukaran('${p.idTukar}')" class="bg-green-600 text-white px-2 py-1 rounded text-sm">Selesaikan</button>` : '-'}</td></tr>`;
                    });
                    contentDiv.innerHTML = `<div class="bg-white rounded-2xl shadow p-4"><h2 class="text-xl font-bold">Penukaran Saldo</h2><table class="min-w-full"><thead><tr><th>Tanggal</th><th>Nasabah</th><th>Metode</th><th>Nominal</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                    window.updatePenukaran = async (id) => {
                        await callApi('updateStatusPenukaran', { idTukar: id, status: 'Selesai' });
                        loadAdminData('penukaran');
                    };
                } else contentDiv.innerHTML = '<div class="text-red-600">Gagal memuat penukaran</div>';
            }
        }
        
        // ========== DASHBOARD PETUGAS ==========
        async function renderPetugasDashboard(container) {
            container.innerHTML = `
                <div class="max-w-6xl mx-auto p-4">
                    <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-emerald-800"><i class="fas fa-truck"></i> Petugas Bank Sampah</h1>
                        <div><span class="font-semibold">${currentUser?.nama}</span> <button onclick="logout()" class="ml-4 bg-red-500 text-white px-3 py-1 rounded">Logout</button></div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="bg-white rounded-2xl shadow p-5">
                            <h3 class="text-lg font-bold mb-3"><i class="fas fa-plus-circle text-emerald-600"></i> Transaksi Setor</h3>
                            <div id="formSetor" class="space-y-3">
                                <select id="nasabahId" class="w-full border p-2 rounded"><option value="">Pilih Nasabah</option></select>
                                <select id="jenisSampah" class="w-full border p-2 rounded"></select>
                                <input type="number" id="beratKg" placeholder="Berat (Kg)" class="w-full border p-2 rounded">
                                <div>Harga: Rp <span id="hargaTampil">0</span>/kg</div>
                                <div class="font-bold">Total: Rp <span id="totalTampil">0</span></div>
                                <button id="btnSetor" class="w-full bg-emerald-700 text-white py-2 rounded-xl">Proses Setor</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl shadow p-5">
                            <h3 class="font-bold">Daftar Nasabah</h3>
                            <div id="listNasabahPetugas" class="overflow-auto max-h-96 text-sm">Memuat...</div>
                        </div>
                    </div>
                    <div class="mt-6 bg-white rounded-2xl shadow p-4">
                        <h3 class="font-bold">Riwayat Transaksi Terbaru</h3>
                        <div id="riwayatPetugas" class="text-sm">Memuat...</div>
                    </div>
                </div>
            `;
            // Load data nasabah
            const nasabahRes = await callApi('getDataNasabah');
            if (nasabahRes.success) {
                let opts = '<option value="">Pilih Nasabah</option>';
                nasabahRes.data.forEach(n => opts += `<option value="${n.id}">${n.nama} (${n.username})</option>`);
                document.getElementById('nasabahId').innerHTML = opts;
                let listHtml = '<ul class="divide-y">';
                nasabahRes.data.forEach(n => listHtml += `<li class="py-2"><b>${n.nama}</b> - Saldo Rp${(n.saldo||0).toLocaleString()}</li>`);
                listHtml += '</ul>';
                document.getElementById('listNasabahPetugas').innerHTML = listHtml;
            }
            // Load harga
            const hargaRes = await callApi('getHargaSampah');
            if (hargaRes.success) {
                let opts = '';
                hargaRes.data.forEach(h => opts += `<option value='${JSON.stringify(h)}' data-harga="${h.hargaBeli}">${h.jenis} - Rp${h.hargaBeli}/kg</option>`);
                document.getElementById('jenisSampah').innerHTML = opts;
                document.getElementById('jenisSampah').addEventListener('change', function() {
                    let val = this.value;
                    if (val) {
                        let obj = JSON.parse(val);
                        document.getElementById('hargaTampil').innerText = obj.hargaBeli;
                        hitungTotal();
                    }
                });
                document.getElementById('beratKg').addEventListener('input', hitungTotal);
                function hitungTotal() {
                    let berat = parseFloat(document.getElementById('beratKg').value) || 0;
                    let harga = parseInt(document.getElementById('hargaTampil').innerText) || 0;
                    document.getElementById('totalTampil').innerText = (berat * harga).toLocaleString();
                }
            }
            document.getElementById('btnSetor').addEventListener('click', async () => {
                const idNasabah = document.getElementById('nasabahId').value;
                const jenisJson = document.getElementById('jenisSampah').value;
                const berat = parseFloat(document.getElementById('beratKg').value);
                if (!idNasabah || !jenisJson || !berat) { alert('Lengkapi data'); return; }
                const jenis = JSON.parse(jenisJson);
                const resSetor = await callApi('tambahTransaksiSetor', {
                    idNasabah, namaNasabah: '', jenisSampah: jenis.jenis, berat, hargaSatuan: jenis.hargaBeli, lokasi: 'Petugas'
                });
                alert(resSetor.message);
                if (resSetor.success) {
                    document.getElementById('beratKg').value = '';
                    loadRiwayatPetugas();
                }
            });
            async function loadRiwayatPetugas() {
                const res = await callApi('getSemuaTransaksi');
                if (res.success && res.data) {
                    let html = '<ul class="divide-y">';
                    res.data.slice(0, 10).forEach(t => {
                        html += `<li class="py-2">${new Date(t.tanggal).toLocaleString()} - ${t.namaNasabah} setor ${t.jenisSampah} ${t.berat}kg = Rp${t.total.toLocaleString()}</li>`;
                    });
                    html += '</ul>';
                    document.getElementById('riwayatPetugas').innerHTML = html;
                }
            }
            loadRiwayatPetugas();
        }
        
        // ========== DASHBOARD NASABAH ==========
        async function renderNasabahDashboard(container) {
            container.innerHTML = `
                <div class="max-w-4xl mx-auto p-4">
                    <div class="bg-white rounded-2xl shadow-md p-5 mb-5">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold"><i class="fas fa-recycle text-emerald-600"></i> Bank Sampah</h1>
                            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl">Logout</button>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl mt-3 flex justify-between items-center">
                            <span class="font-semibold">💰 Saldo Anda :</span>
                            <span class="text-3xl font-bold text-emerald-700" id="saldoNasabah">Rp0</span>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-5">
                        <div class="bg-white p-5 rounded-2xl shadow">
                            <h2 class="font-bold text-xl"><i class="fas fa-hand-holding-usd"></i> Ajukan Penukaran</h2>
                            <div class="space-y-3 mt-2">
                                <select id="metodeTukar" class="w-full border p-2 rounded"><option value="Tunai">Tunai (Ambil di Kantor)</option><option value="Transfer Bank">Transfer Bank</option></select>
                                <input type="number" id="nominalTukar" placeholder="Nominal (min Rp10.000)" class="w-full border p-2 rounded">
                                <textarea id="keteranganTukar" placeholder="Keterangan" class="w-full border p-2 rounded"></textarea>
                                <button id="btnTukar" class="w-full bg-amber-600 text-white py-2 rounded-xl">Kirim Permintaan</button>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow overflow-auto">
                            <h2 class="font-bold text-xl"><i class="fas fa-history"></i> Riwayat Setor</h2>
                            <div id="riwayatSetorNasabah" class="max-h-80 overflow-y-auto text-sm">Memuat...</div>
                        </div>
                    </div>
                    <div class="mt-5 bg-white p-4 rounded-2xl shadow">
                        <h3 class="font-bold">📜 Riwayat Penukaran</h3>
                        <div id="riwayatPenukaranNasabah" class="text-sm">Memuat...</div>
                    </div>
                </div>
            `;
            // Load saldo
            const nasabahData = await callApi('getNasabahById', { id: currentUser.userId });
            if (nasabahData.success && nasabahData.data) {
                document.getElementById('saldoNasabah').innerHTML = `Rp${(nasabahData.data.saldo || 0).toLocaleString()}`;
            }
            // Load riwayat setor
            const setorRes = await callApi('getTransaksiNasabah');
            if (setorRes.success) {
                let html = '<ul class="divide-y">';
                setorRes.data.forEach(t => {
                    html += `<li class="py-2"><b>${t.jenisSampah}</b> ${t.berat}kg → +Rp${t.total.toLocaleString()} <span class="text-xs text-gray-500">${new Date(t.tanggal).toLocaleDateString()}</span></li>`;
                });
                html += '</ul>';
                document.getElementById('riwayatSetorNasabah').innerHTML = html || 'Belum ada setoran';
            }
            // Load riwayat penukaran
            const penukaranRes = await callApi('getDataPenukaran');
            if (penukaranRes.success) {
                let html = '<ul class="divide-y">';
                penukaranRes.data.filter(p => p.idNasabah === currentUser.userId).forEach(p => {
                    html += `<li class="py-2">${p.metode} - Rp${p.nominal.toLocaleString()} : ${p.status}</li>`;
                });
                html += '</ul>';
                document.getElementById('riwayatPenukaranNasabah').innerHTML = html || 'Belum ada penukaran';
            }
            document.getElementById('btnTukar').addEventListener('click', async () => {
                let nominal = parseInt(document.getElementById('nominalTukar').value);
                if (isNaN(nominal) || nominal < 10000) { alert('Minimal Rp10.000'); return; }
                const metode = document.getElementById('metodeTukar').value;
                const keterangan = document.getElementById('keteranganTukar').value;
                const res = await callApi('ajukanPenukaran', { metode, nominal, keterangan });
                alert(res.message);
                if (res.success) location.reload();
            });
        }
        
        // ========== LOGOUT ==========
        function logout() {
            localStorage.removeItem('session');
            currentUser = null;
            navigate('login');
        }
        
        // ========== INIT ==========
        window.addEventListener('load', () => {
            const hash = window.location.hash.substring(1);
            if (hash && ['login', 'admin', 'petugas', 'nasabah'].includes(hash)) {
                navigate(hash);
            } else {
                const session = JSON.parse(localStorage.getItem('session') || 'null');
                if (session) navigate(session.role);
                else navigate('login');
            }
        });
        window.navigate = navigate;
        window.logout = logout;
        window.loadAdminData = loadAdminData;
    </script>
</body>
</html>
