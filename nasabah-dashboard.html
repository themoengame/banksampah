<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasabah - Bank Sampah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-white rounded-2xl shadow-md p-5 mb-5">
            <div class="flex justify-between items-center">
                <div><h1 class="text-2xl font-bold">🏦 Bank Sampah</h1><p id="namaNasabah" class="text-gray-500"></p></div>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div class="bg-emerald-50 p-4 rounded-xl mt-3 flex justify-between items-center">
                <span class="font-semibold">💰 Saldo Anda :</span>
                <span class="text-3xl font-bold text-emerald-700" id="saldoNasabah">Rp0</span>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-5">
            <div class="bg-white p-5 rounded-2xl shadow">
                <h2 class="font-bold text-xl"><i class="fas fa-hand-holding-usd text-emerald-600"></i> Ajukan Penukaran</h2>
                <div class="mt-3 space-y-3">
                    <select id="metodeTukar" class="w-full border p-2 rounded">
                        <option value="Tunai">Tunai (Ambil di Kantor)</option>
                        <option value="Transfer Bank">Transfer Bank</option>
                    </select>
                    <input type="number" id="nominalTukar" placeholder="Nominal (min Rp10.000)" class="w-full border p-2 rounded">
                    <textarea id="keteranganTukar" placeholder="Keterangan (opsional)" class="w-full border p-2 rounded"></textarea>
                    <button id="btnTukar" class="w-full bg-amber-600 text-white py-2 rounded-xl">Kirim Permintaan</button>
                </div>
                <p id="msgPenukaran" class="text-sm mt-2 hidden"></p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow overflow-auto">
                <h2 class="font-bold text-xl"><i class="fas fa-history"></i> Riwayat Setor Sampah</h2>
                <div id="riwayatSetor" class="max-h-80 overflow-y-auto text-sm">Memuat...</div>
            </div>
        </div>

        <div class="mt-5 bg-white p-4 rounded-2xl shadow">
            <h3 class="font-bold">📜 Riwayat Penukaran</h3>
            <div id="riwayatPenukaran" class="text-sm">Memuat...</div>
        </div>
    </div>

    <script>
        let saldoSaatIni = 0;
        function loadNasabahInfo(){
            google.script.run.withSuccessHandler(user => {
                if(user && user.userId){
                    document.getElementById('namaNasabah').innerHTML = `Halo, ${user.nama}`;
                    google.script.run.withSuccessHandler(nasabah => { if(nasabah){ saldoSaatIni = nasabah.saldo||0; document.getElementById('saldoNasabah').innerHTML = `Rp${(nasabah.saldo||0).toLocaleString()}`; } }).getNasabahById(user.userId);
                }
            }).getCurrentUser();
        }
        function loadRiwayatSetor(){
            google.script.run.withSuccessHandler(res => {
                if(res.success){
                    let html = '<ul class="divide-y">';
                    res.data.forEach(t => { html += `<li class="py-2"><b>${t.jenisSampah}</b> ${t.berat}kg -> +Rp${t.total.toLocaleString()} <span class="text-gray-400 text-xs">${new Date(t.tanggal).toLocaleDateString()}</span></li>`; });
                    html += '</ul>';
                    document.getElementById('riwayatSetor').innerHTML = html || 'Belum ada setoran';
                } else document.getElementById('riwayatSetor').innerHTML = 'Gagal memuat';
            }).getTransaksiNasabah();
        }
        function loadRiwayatPenukaran(){
            google.script.run.withSuccessHandler(res => {
                if(res.success){
                    let txt = '<ul>';
                    res.data.forEach(p => { txt += `<li>${p.tanggal ? new Date(p.tanggal).toLocaleDateString():''} ${p.metode} - Rp${p.nominal.toLocaleString()} : ${p.status}</li>`; });
                    txt += '</ul>';
                    document.getElementById('riwayatPenukaran').innerHTML = txt || 'Belum ada';
                }
            }).getDataPenukaran();
        }
        document.getElementById('btnTukar').addEventListener('click', function(){
            let nominal = parseInt(document.getElementById('nominalTukar').value);
            if(isNaN(nominal) || nominal < 10000) { alert('Minimal Rp10.000'); return; }
            if(nominal > saldoSaatIni) { alert('Saldo tidak mencukupi'); return; }
            let metode = document.getElementById('metodeTukar').value;
            let keterangan = document.getElementById('keteranganTukar').value;
            google.script.run.withSuccessHandler(res => { alert(res.message); if(res.success){ loadNasabahInfo(); loadRiwayatPenukaran(); document.getElementById('nominalTukar').value=''; } }).ajukanPenukaran({metode, nominal, keterangan});
        });
        function logout() { google.script.run.logout(); window.location.href = '?page=login'; }
        loadNasabahInfo();
        loadRiwayatSetor();
        loadRiwayatPenukaran();
    </script>
</body>
</html>
